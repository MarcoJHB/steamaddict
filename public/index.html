<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SteamPlaytime — Playtime Tracker</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23000'/><text x='50' y='70' font-size='60' font-weight='bold' fill='%231db954' text-anchor='middle'>S</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- TOP NAV -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">STEAM<span>PLAYTIME</span></div>
      <div class="tagline">community playtime tracker</div>
    </div>
    <div class="topbar-right">
      <span class="last-updated" id="lastUpdated">—</span>
    </div>
  </header>

  <!-- STAT CARDS -->
  <section class="stats-row">
    <div class="stat-card">
      <div class="stat-label">GAMES TRACKED</div>
      <div class="stat-val" id="s-count">—</div>
      <div class="stat-sub">across all genres</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">AVG PLAYTIME</div>
      <div class="stat-val" id="s-avg">—</div>
      <div class="stat-sub">hours (mean)</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">HIGHEST AVG</div>
      <div class="stat-val" id="s-high">—</div>
      <div class="stat-sub" id="s-high-name">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">MOST REVIEWED</div>
      <div class="stat-val" id="s-reviews">—</div>
      <div class="stat-sub" id="s-reviews-name">—</div>
    </div>
  </section>

  <!-- MAIN LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">GENRE</div>
        <button class="filter-btn active" data-genre="all" onclick="setGenre('all', this)">
          All <span class="badge" id="b-all">0</span>
        </button>
        <button class="filter-btn" data-genre="strategy" onclick="setGenre('strategy', this)">
          Strategy <span class="badge" id="b-strategy">0</span>
        </button>
        <button class="filter-btn" data-genre="management" onclick="setGenre('management', this)">
          Management <span class="badge" id="b-management">0</span>
        </button>
        <button class="filter-btn" data-genre="tycoon" onclick="setGenre('tycoon', this)">
          Tycoon <span class="badge" id="b-tycoon">0</span>
        </button>
        <button class="filter-btn" data-genre="4X" onclick="setGenre('4X', this)">
          4X <span class="badge" id="b-4X">0</span>
        </button>
        <button class="filter-btn" data-genre="colony sim" onclick="setGenre('colony sim', this)">
          Colony sim <span class="badge" id="b-colony-sim">0</span>
        </button>
        <button class="filter-btn" data-genre="city builder" onclick="setGenre('city builder', this)">
          City builder <span class="badge" id="b-city-builder">0</span>
        </button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">SORT BY</div>
        <button class="filter-btn active-sort" data-sort="avg" onclick="setSort('avg', this)">Avg playtime</button>
        <button class="filter-btn" data-sort="atReview" onclick="setSort('atReview', this)">At review</button>
        <button class="filter-btn" data-sort="lastTwoWeeks" onclick="setSort('lastTwoWeeks', this)">Last 2 weeks</button>
        <button class="filter-btn" data-sort="median" onclick="setSort('median', this)">Median</button>
        <button class="filter-btn" data-sort="name" onclick="setSort('name', this)">Name</button>
      </div>


    </aside>

    <!-- CONTENT -->
    <main class="content">
      <div class="toolbar">
        <input class="search-input" type="text" id="search" placeholder="Search games..." oninput="renderTable()" />
        <div class="result-count" id="resultCount">— games</div>
      </div>

      <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <p>Loading game data...</p>
      </div>

      <div id="tableWrap" style="display:none">
        <table id="gameTable">
          <thead>
            <tr>
              <th class="col-name">Game</th>
              <th class="col-num sortable sorted" data-col="avg" onclick="setSort('avg')">Avg Playtime (All-Time) ▼</th>
              <th class="col-num sortable" data-col="lastTwoWeeks" onclick="setSort('lastTwoWeeks')">Playtime (This Week)</th>
              <th class="col-num sortable" data-col="rating" onclick="setSort('rating')">Rating</th>
              <th class="col-num sortable" data-col="sampleSize" onclick="setSort('sampleSize')"># Reviewed</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </main>
  </div>

</div>

<div id="toast" class="toast"></div>

<script src="app.js"></script>
</body>
</html>
